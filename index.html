<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ECT Probe Designer</title>

    <!-- 外部 CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>ECT Probe Designer</h1>
    </header>

    <!-- ここに整理済み UI を貼る -->
    <main id="app">

        <!-- 探傷ナビ -->
        <section>
            <h2 class="section-title">探傷ナビ（周波数推奨）</h2>

            <div class="container">
                <label for="material">材質</label>
                <select id="material">
                    <option value="nonmagnetic">非磁性体</option>
                    <option value="magnetic">磁性体</option>
                </select>

                <label for="depth">探傷深さ (mm)</label>
                <input type="number" id="depth" placeholder="例: 1.0">

                <button class="action-button" onclick="runFrequencyCalc()">周波数を計算</button>

                <div class="result-box">
                    <strong>推奨周波数:</strong>
                    <span id="freqResult">---</span>
                </div>
            </div>
        </section>

        <!-- 円筒コイル設計 -->
        <section>
            <h2 class="section-title">円筒コイル設計</h2>

            <div class="container">
                <label for="cylDiameter">直径 (mm)</label>
                <input type="number" id="cylDiameter">

                <label for="cylLength">長さ (mm)</label>
                <input type="number" id="cylLength">

                <label for="cylTurns">巻き数</label>
                <input type="number" id="cylTurns">

                <button class="action-button" onclick="runCylCalc()">インダクタンスを計算</button>

                <div class="result-box">
                    <strong>L (μH):</strong>
                    <span id="cylL">---</span>
                </div>
            </div>
        </section>

        <!-- 長方形コイル設計 -->
        <section>
            <h2 class="section-title">長方形コイル設計</h2>

            <div class="container">
                <label for="rectA">辺A (mm)</label>
                <input type="number" id="rectA">

                <label for="rectB">辺B (mm)</label>
                <input type="number" id="rectB">

                <label for="rectTurns">巻き数</label>
                <input type="number" id="rectTurns">

                <button class="action-button" onclick="runRectCalc()">インダクタンスを計算</button>

                <div class="result-box">
                    <strong>L (μH):</strong>
                    <span id="rectL">---</span>
                </div>
            </div>
        </section>

        <!-- 実測逆算 -->
        <section>
            <h2 class="section-title">実測値から巻き数を逆算</h2>

            <div class="container">
                <label for="measL">実測 L (μH)</label>
                <input type="number" id="measL">

                <label for="measDiameter">直径 (mm)</label>
                <input type="number" id="measDiameter">

                <label for="measLength">長さ (mm)</label>
                <input type="number" id="measLength">

                <button class="action-button" onclick="runReverseCalc()">巻き数を推定</button>

                <div class="result-box">
                    <strong>推定巻き数:</strong>
                    <span id="revTurns">---</span>
                </div>
            </div>
        </section>

    </main>

    <!-- 外部 JS -->
    <script src="js/utils.js"></script>
    <script src="js/materials.js"></script>
    <script src="js/frequency.js"></script>
    <script src="js/coil_cyl.js"></script>
    <script src="js/coil_rect.js"></script>
    <script src="js/reverse_calc.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
